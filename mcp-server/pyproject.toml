[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meta-ads-mcp-codemode"
version = "0.1.0"
description = "Meta Marketing API MCP server with FastMCP Code Mode — auto-generated from Meta's official SDK specs"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Thales Laray" }]
keywords = ["meta-ads", "facebook-ads", "mcp", "fastmcp", "code-mode", "marketing-api"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "fastapi>=0.136.1",
    "fastmcp[code-mode]>=3.1.0",
    "httpx>=0.28.0",
    "prefab-ui>=0.10.0",
    "streamlit>=1.56.0",
    "uvicorn>=0.41.0",
]

[project.scripts]
meta-ads-mcp = "meta_ads_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/meta_ads_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "respx>=0.22"]
